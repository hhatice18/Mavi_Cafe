<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavi Cafe Admin</title>
    <style>
       /* ==========================================================================
   DİNAMİK VE CANLI ADMİN ARKA PLANI
   ========================================================================== */
body {
    margin: 0;
    /* Düz koyu lacivert yerine, ana sayfanın rengiyle uyumlu, derinlik katılmış canlı bir geçiş */
    background: radial-gradient(circle at center, #5b8fb9 0%, #487095 60%, #0c1b33 100%);
    color: white;
    font-family: 'Poppins', sans-serif;
    padding: 20px;
    min-height: 100vh;
}

/* 🔒 PROFESYONEL VE GENİŞ ADMİN GİRİŞ EKRANI */
        .giris-ekrani {
            position: fixed;
            inset: 0;
            background: #071126;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

/* ==========================================================================
   NEON IŞIKLI VE CAM EFEKTLİ GİRİŞ KUTUSU
   ========================================================================== */
.giris-kutu {
    width: 450px;
    padding: 45px;
    border-radius: 32px;
    /* Kutunun içini hafif beyaz-mavi bir cam parıltısına çevirdik */
    background: rgba(255, 255, 255, 0.07); 
    border: 1px solid rgba(121, 217, 255, 0.25); /* İnce mavi parıltılı kenarlık */
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    
    /* SİHİRLİ DOKUNUŞ: Kutunun etrafına çok asil, hafifçe yayılan neon mavi bir ışık dalgası ekledik */
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                0 0 40px rgba(121, 217, 255, 0.15); 
                
    text-align: center;
    position: relative;
    box-sizing: border-box;
}


        .giris-kapat {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: color 0.2s;
            font-weight: bold;
        }
        .giris-kapat:hover { color: #ff5252; }

        .giris-kutu h2 { 
            margin-top: 0; 
            margin-bottom: 25px;
            color: #79d9ff; 
            font-size: 26px;
            letter-spacing: 1px;
        }

        .giris-kutu input {
            width: 100%;
            padding: 16px 20px;
            margin-top: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .giris-kutu input:focus {
            border-color: #0077ff;
            box-shadow: 0 0 10px rgba(0, 119, 255, 0.3);
        }

        .giris-kutu button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #0077ff, #0056b3);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 119, 255, 0.25);
            transition: all 0.3s ease;
        }

        .giris-kutu button:hover {
            background: linear-gradient(135deg, #0088ff, #0066cc);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 119, 255, 0.4);
        }

        .giris-kutu button:active {
            transform: translateY(0);
        }

        /* PANEL ANA YAPISI */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Üst Bar: Başlık ve Çıkış Butonu */
        .ust-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(121, 217, 255, 0.2);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .ust-bar h1 {
            font-size: 36px;
            margin: 0;
            color: #79d9ff;
        }

        .btn-cikis {
            padding: 10px 20px;
            border: 2px solid #ff5252;
            border-radius: 14px;
            background: transparent;
            color: #ff5252;
            font-weight: bold;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-cikis:hover {
            background: #ff5252;
            color: white;
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.4);
        }

        /* MASALAR ALANI */
        .masalar-bolumu { margin-bottom: 40px; }
        .masalar-bolumu h2 { color: #79d9ff; font-size: 22px; margin-bottom: 15px; }
        
        #masalarGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .masa-kart {
            background: #111a44;
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .masa-kart img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            background: #1d2a5c;
        }
        .masa-kart h4 { margin: 10px 0 5px 0; font-size: 18px; }
        
        .durum-yazisi { font-weight: bold; font-size: 14px; }
        
        /* Renk Durumları */
        .bos { color: #6eff6e; }
        .siparis-var { color: orange; }
        .hesap-istiyor { color: #ff5252; font-weight: 800; }

        /* SİPARİŞ KARTLARI */
        #siparisler {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .siparis-kart {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 28px;
            padding: 22px;
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .siparis-kart.hesap-kart-border {
            border: 1px solid #ff5252;
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.2);
        }

        .siparis-kart h2 { margin-top: 0; color: #79d9ff; }
        .siparis-kart ul { padding-left: 20px; margin: 10px 0; }
        .siparis-kart li { margin-bottom: 8px; }

        .not {
            margin-top: 10px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .07);
            font-size: 14px;
        }

        .zaman { margin-top: 10px; font-size: 13px; opacity: .7; margin-bottom: 15px; }

        .onay-btn {
            padding: 12px;
            border: none;
            border-radius: 14px;
            background: #111a44;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .onay-btn:hover { background: #111a44; }
        
        .onay-btn.btn-hesap-kapat {
            background: #ff5252;
        }
        .onay-btn.btn-hesap-kapat:hover {
            background: #c33c3c;
        }
    </style>
</head>

<body>

    <div id="girisEkrani" class="giris-ekrani">
        <div class="giris-kutu">
            <div class="giris-kapat" onclick="paneliKapat()">×</div>
            <h2>🔒 Admin Giriş</h2>
            <input type="password" id="adminSifre" placeholder="Şifre">
            <button onclick="girisYap()">Giriş Yap</button>
        </div>
    </div>

    <div class="admin-container">
        
        <div class="ust-bar">
            <h1>☁️ Mavi Cafe Panel</h1>
            <button class="btn-cikis" onclick="paneliKapat()">🚪 Çıkış Yap</button>
        </div>

        <div class="masalar-bolumu">
            <h2>🪟 Masa Durumları</h2>
            <div id="masalarGrid"></div>
        </div>

        <hr style="border: 1px solid rgba(255,255,255,0.05); margin: 30px 0;">

        <div>
            <h2 style="color: #79d9ff; font-size: 22px; margin-bottom: 15px;">📝 Aktif Talepler</h2>
            <div id="siparisler"></div>
        </div>
    </div>

<script>
const tumMasalar = ["1", "2", "3", "4", "5", "6", "7", "8", "10"];

function girisYap() {
    const sifre = document.getElementById("adminSifre").value;
    if (sifre === "1234") {
        document.getElementById("girisEkrani").style.display = "none";
    } else {
        alert("Şifre yanlış");
    }
}

function paneliKapat() {
    window.location.href = "index.html";
}

function verileriYukle() {
    const alan = document.getElementById("siparisler");
    const masalarGrid = document.getElementById("masalarGrid");
    
    alan.innerHTML = "";
    masalarGrid.innerHTML = "";

    const siparisler = JSON.parse(localStorage.getItem("siparisler")) || {};

    tumMasalar.forEach(masaNo => {
        const siparis = siparisler[masaNo];
        let durumClass = "bos";
        let durumMetni = "Boş";

        if (siparis) {
            if (siparis.tip === "hesap") {
                durumClass = "hesap-istiyor";
                durumMetni = "Hesap İstiyor! 🔴";
            } else {
                durumClass = "siparis-var";
                durumMetni = "Sipariş Var 🟠";
            }
        }

        masalarGrid.innerHTML += `
            <div class="masa-kart">
                <img src="resim/masa.jpg" alt="Masa ${masaNo}">
                <h4>Masa ${masaNo}</h4>
                <span class="durum-yazisi ${durumClass}">${durumMetni}</span>
            </div>
        `;
    });

    for (let masa in siparisler) {
        const siparis = siparisler[masa];
        let toplam = 0;
        let isHesap = siparis.tip === "hesap";

        let urunlerHTML = "";
        if (siparis.urunler && siparis.urunler.length > 0) {
            urunlerHTML = siparis.urunler.map((u) => {
                toplam += u.fiyat;
                return `<li>${u.ad} - ${u.fiyat} TL</li>`;
            }).join("");
        } else {
            urunlerHTML = "<li>Masadan sipariş kaydı yok (Direkt Hesap İstendi).</li>";
        }

        let butonMetni = isHesap ? "Hesap Alındı / Masayı Boşalt" : "Onaylandı (Temizle)";
        let butonClass = isHesap ? "onay-btn btn-hesap-kapat" : "onay-btn";
        let kartClass = isHesap ? "siparis-kart hesap-kart-border" : "siparis-kart";

        alan.innerHTML += `
            <div class="${kartClass}">
                <div>
                    <h2>Masa ${masa} ${isHesap ? "🔔 (HESAP TALEBİ)" : ""}</h2>
                    <ul>
                        ${urunlerHTML}
                    </ul>
                    <h3>Toplam Tutar: ${toplam} TL</h3>
                    <div class="not">💬 ${siparis.not || "Not yok"}</div>
                    <div class="zaman">🕒 ${siparis.zaman || "Zaman belirtilmedi"}</div>
                </div>
                <button class="${butonClass}" onclick="siparisiTamamla('${masa}')">${butonMetni}</button>
            </div>
        `;
    }
}

function siparisiTamamla(masa) {
    let siparisler = JSON.parse(localStorage.getItem("siparisler")) || {};
    delete siparisler[masa];
    localStorage.setItem("siparisler", JSON.stringify(siparisler));
    verileriYukle();
}

verileriYukle();
setInterval(verileriYukle, 1000);
</script>

</body>
</html>
